<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>懶人自動化工作流</title>
<body style="margin:0;background:#08080c;color:#f6f1dd;font-family:system-ui,'Noto Sans TC',sans-serif;display:grid;place-items:center;min-height:100vh">
<div style="max-width:620px;padding:32px;text-align:center;line-height:1.7">
  <h1 style="font-size:26px;margin:0 0 10px">懶人自動化工作流載入中</h1>
  <p id="status" style="color:#d9c878">正在載入新版頁面 v-pako-first...</p>
</div>
<script>
(async()=>{
  const VERSION = 'pako-first-20260529-01';
  const status = document.getElementById('status');
  const source = 'https://raw.githubusercontent.com/tony0928932688/CHIWA/b44b3da8d12241bd412da77c02352004dd3bdf9d/lazy-workflow-test.html';
  const pakoCdn = 'https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js';
  function extractPayload(raw){
    const marker = "const b='";
    const start = raw.indexOf(marker);
    if(start < 0) throw new Error('payload marker not found');
    const from = start + marker.length;
    const end = raw.indexOf("';", from);
    if(end < 0) throw new Error('payload end not found');
    return raw.slice(from, end).replace(/[^A-Za-z0-9+/=]/g, '');
  }
  function base64ToBytes(b64){
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
    const clean = String(b64 || '').replace(/[^A-Za-z0-9+/=]/g, '');
    const out = [];
    for(let i = 0; i < clean.length; i += 4){
      const c1 = chars.indexOf(clean[i]);
      const c2 = chars.indexOf(clean[i + 1]);
      const c3 = clean[i + 2] === '=' ? -1 : chars.indexOf(clean[i + 2]);
      const c4 = clean[i + 3] === '=' ? -1 : chars.indexOf(clean[i + 3]);
      if(c1 < 0 || c2 < 0) break;
      out.push((c1 << 2) | (c2 >> 4));
      if(c3 >= 0) out.push(((c2 & 15) << 4) | (c3 >> 2));
      if(c4 >= 0) out.push(((c3 & 3) << 6) | c4);
    }
    return new Uint8Array(out);
  }
  async function ungzipNative(bytes){
    if(!('DecompressionStream' in window)) throw new Error('native gzip unavailable');
    const ds = new DecompressionStream('gzip');
    return await new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();
  }
  async function ungzipPako(bytes){
    if(!window.pako){
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src=pakoCdn; s.onload=resolve; s.onerror=()=>reject(new Error('pako load failed'));
        document.head.appendChild(s);
      });
    }
    const result = window.pako.ungzip(bytes);
    return new TextDecoder('utf-8').decode(result);
  }
  try{
    status.textContent = '正在載入新版頁面 ' + VERSION + '...';
    const raw = await fetch(source + '?v=' + VERSION, { cache:'no-store' }).then(r=>{
      if(!r.ok) throw new Error('payload HTTP ' + r.status);
      return r.text();
    });
    const payload = extractPayload(raw);
    const bytes = base64ToBytes(payload);
    if(bytes[0] !== 31 || bytes[1] !== 139) throw new Error('payload gzip invalid');
    let html = '';
    let pakoError = null;
    try{ html = await ungzipPako(bytes); }
    catch(e){ pakoError = e; }
    if(!html || html.length < 1000){
      try{ html = await ungzipNative(bytes); }
      catch(e){ throw pakoError || e; }
    }
    if(!html || html.length < 1000) throw new Error('payload too short ' + (html ? html.length : 0));
    document.open(); document.write(html); document.close();
  }catch(e){
    status.textContent = '載入失敗 ' + VERSION + '：' + e.message + '。這是部署載入器問題，不是你操作問題。';
    status.style.color = '#ff8b8b';
  }
})();
</script>
</body>
