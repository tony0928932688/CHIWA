<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>懶人自動化工作流｜吉娃 AI</title>
<style>
:root{--bg:#08080c;--card:#12121a;--bdr:#34344a;--gold:#e8c55a;--text:#f6f1dd;--muted:#aaa6c8;--green:#3ecf8e}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,rgba(232,197,90,.12),transparent 34%),var(--bg);color:var(--text);font-family:system-ui,'Noto Sans TC',sans-serif;line-height:1.65}.wrap{max-width:1040px;margin:auto;padding:36px 18px 80px}.hero{border:1px solid rgba(232,197,90,.35);border-radius:20px;background:rgba(18,18,26,.92);padding:28px}.eyebrow{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:.14em}h1{font-size:34px;line-height:1.15;margin:8px 0}.sub{color:var(--muted);font-size:17px}.notice{margin-top:16px;border:1px solid rgba(62,207,142,.35);background:rgba(62,207,142,.08);border-radius:14px;padding:14px 16px;color:#ddfff0}.btn{display:inline-block;margin-top:20px;border-radius:999px;background:var(--gold);color:#07070b;text-decoration:none;font-weight:900;padding:12px 20px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:18px}.step{border:1px solid var(--bdr);border-radius:14px;padding:14px;background:#101019}.step b{color:var(--gold);display:block;margin-bottom:5px}.templates{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.tpl{border:1px solid var(--bdr);border-radius:14px;background:#101019;padding:14px}.tpl:first-child{border-color:var(--gold)}@media(max-width:860px){.grid,.templates{grid-template-columns:1fr}h1{font-size:28px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="eyebrow">CHIWA AI LAZY WORKFLOW</div>
    <h1>懶人自動化工作流入口已恢復</h1>
    <div class="sub">這一頁已經移除會卡住的 self-contained loader，不再使用壓縮 payload、不再跳轉舊測試頁。</div>
    <div class="notice">如果你剛剛看到「正在載入新版頁面 self-contained...」停住，那是舊載入器快取。請用下方按鈕開新的正式入口。</div>
    <a class="btn" href="/lazy-workflow.html?v=direct-20260529-2">打開正式懶人工作流</a>
  </section>
  <div class="grid">
    <div class="step"><b>Step 1</b>生成選題</div>
    <div class="step"><b>Step 2</b>確認文案</div>
    <div class="step"><b>Step 3</b>生成語音並試聽</div>
    <div class="step"><b>Step 4</b>生成數字人</div>
    <div class="step"><b>Step 5</b>套模板輸出成片</div>
  </div>
  <div class="templates">
    <div class="tpl">金黑高級品牌風</div>
    <div class="tpl">TikTok 大標題爆款風</div>
    <div class="tpl">乾淨專業知識風</div>
    <div class="tpl">低調字幕口播風</div>
  </div>
</div>
</body>
</html>
