<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>懶人自動化工作流</title>
<body style="margin:0;background:#08080c;color:#f6f1dd;font-family:system-ui,'Noto Sans TC',sans-serif;display:grid;place-items:center;min-height:100vh">
<div style="max-width:620px;padding:32px;text-align:center;line-height:1.7">
  <h1 style="font-size:26px;margin:0 0 10px">懶人自動化工作流載入中</h1>
  <p id="status" style="color:#d9c878">正在載入新版頁面...</p>
</div>
<script>
(async()=>{
  const status = document.getElementById('status');
  const source = 'https://raw.githubusercontent.com/tony0928932688/CHIWA/b44b3da8d12241bd412da77c02352004dd3bdf9d/lazy-workflow-test.html';
  const pakoCdn = 'https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js';
  function bytesFromBase64(b64){ return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
  async function ungzipNative(bytes){
    if(!('DecompressionStream' in window)) throw new Error('native gzip unavailable');
    const ds = new DecompressionStream('gzip');
    return await new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();
  }
  async function loadPako(){
    if(window.pako) return window.pako;
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = pakoCdn;
      s.onload = resolve;
      s.onerror = () => reject(new Error('pako 載入失敗'));
      document.head.appendChild(s);
    });
    return window.pako;
  }
  try{
    status.textContent = '正在取得頁面資料...';
    const res = await fetch(source + '?v=stable-20260529', { cache:'no-store' });
    if(!res.ok) throw new Error('來源讀取失敗 HTTP ' + res.status);
    const loaderText = await res.text();
    const m = loaderText.match(/const\s+b\s*=\s*'([^']+)'/);
    if(!m) throw new Error('找不到頁面資料');
    const bytes = bytesFromBase64(m[1]);
    let html = '';
    try{
      status.textContent = '正在解碼頁面...';
      html = await ungzipNative(bytes);
    }catch(_){
      status.textContent = '正在使用備用解碼方式...';
      const pako = await loadPako();
      html = pako.ungzip(bytes, { to:'string' });
    }
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    status.textContent = '載入失敗：' + e.message + '。請重新整理一次；如果還是不行，我會改成直接部署純 HTML。';
    status.style.color = '#ff8b8b';
  }
})();
</script>
</body>
